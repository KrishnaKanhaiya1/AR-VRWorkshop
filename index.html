<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VR Traffic Police Training Simulator – Kochi</title>
  <meta name="description" content="Immersive VR traffic police training simulator built with A-Frame for Meta Quest. Train officers to manage intersections, spot violations, and issue fines.">

  <!-- A-Frame 1.7 -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <!-- A-Frame Extras (for animation-mixer, movement-controls) -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.4.0/dist/aframe-extras.min.js"></script>

  <script src="script.js"></script>

  <style>
    body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }

    #ui-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 100;
    }

    #hud {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 20px;
      pointer-events: none;
    }

    .hud-card {
      background: rgba(0,0,0,0.75);
      border: 1px solid rgba(255,255,255,0.2);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 10px 22px;
      color: #fff;
      text-align: center;
      min-width: 110px;
    }
    .hud-card .label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; opacity: 0.7; }
    .hud-card .value { font-size: 28px; font-weight: 700; margin-top: 2px; }
    #score-val { color: #4ade80; }
    #timer-val { color: #facc15; }
    #fines-val { color: #f87171; }
  </style>
</head>

<body>
  <a-scene>
    <!-- Scene setup -->
    <a-entity environment="preset: city; groundColor: #a0a0a0; skyColor: #87CEEB;"></a-entity>

    <!-- Traffic lights -->
    <a-entity traffic-light position="-5 3 -10"></a-entity>
    <a-entity traffic-light position="5 3 -10"></a-entity>
    <a-entity traffic-light position="-5 3 10"></a-entity>
    <a-entity traffic-light position="5 3 10"></a-entity>

    <!-- Cars -->
    <a-entity car-driver position="-5 0 -15"></a-entity>
    <a-entity car-driver position="5 0 -15"></a-entity>
    <a-entity car-driver position="-5 0 15"></a-entity>
    <a-entity car-driver position="5 0 15"></a-entity>

    <!-- HUD -->
    <div id="ui-overlay">
      <div id="hud">
        <div class="hud-card">
          <div class="label">Score</div>
          <div id="score-val" class="value">0</div>
        </div>
        <div class="hud-card">
          <div class="label">Time Left</div>
          <div id="timer-val" class="value">90</div>
        </div>
        <div class="hud-card">
          <div class="label">Fines</div>
          <div id="fines-val" class="value">0</div>
        </div>
      </div>
    </div>
  </a-scene>
</body>
</html>
